<VirtualHost *:80>
    ServerAdmin webmaster@localhost
    DocumentRoot /var/www/html

    <Directory /var/www/html>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Reverse proxy ONLY auth and shift requests to internal Node.js backend
    # Other /api/* PHP files are served directly by Apache
    ProxyPreserveHost On
    ProxyPass /api/auth http://127.0.0.1:3000/api/auth
    ProxyPassReverse /api/auth http://127.0.0.1:3000/api/auth
    ProxyPass /api/shifts http://127.0.0.1:3000/api/shifts
    ProxyPassReverse /api/shifts http://127.0.0.1:3000/api/shifts

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>