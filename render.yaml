services:
  # Unified PHP + Node.js Service
  - type: web
    name: maseno-retail
    runtime: docker
    plan: free
    rootDir: .
    dockerfilePath: ./Dockerfile
    healthCheckPath: /index.php
    envVars:
      # REQUIRED: Set your Neon database URL in Render dashboard
      - key: DATABASE_URL
        sync: false
      # OPTIONAL: External backend URL (leave blank for combined container mode using localhost:3000)
      - key: BACKEND_URL
        sync: false
      - key: PHP_DISPLAY_ERRORS
        value: 1
      - key: PHP_MEMORY_LIMIT
        value: 256M
